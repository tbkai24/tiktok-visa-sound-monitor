name: TikTok Fetch (30m)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: tt-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install TikTokApi playwright
          python -m playwright install chromium --with-deps

      - name: Run fetch script
        env:
          TTVM_SUPABASE_URL: ${{ secrets.TTVM_SUPABASE_URL }}
          TTVM_SUPABASE_ANON_KEY: ${{ secrets.TTVM_SUPABASE_ANON_KEY }}
          TTVM_TIKTOK_SOUND_IDS: ${{ secrets.TTVM_TIKTOK_SOUND_IDS }}
          TTVM_TIKTOK_MS_TOKEN: ${{ secrets.TTVM_TIKTOK_MS_TOKEN }}
          TTVM_TIKTOK_PROXY: ${{ secrets.TTVM_TIKTOK_PROXY }}
          TTVM_TIKTOK_BROWSER: "webkit"
          TTVM_TIKTOK_HEADLESS: "false"
          TTVM_SESSION_SLEEP_AFTER_SECONDS: "5"
          TTVM_MAX_VIDEOS_PER_SOUND: "200"
          TTVM_FETCH_RETRIES: "5"
          TTVM_RETRY_DELAY_SECONDS: "5"
        run: python scripts/tt_try_fetch.py

      - name: Notify failure (Discord)
        if: ${{ failure() && secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "content": "[FAILED] TikTok Fetch failed.\nRepo: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -sS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK_URL"
